<!DOCTYPE html>
<html>
<head>
    <title>Sony TV Remote</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .status-label {
            font-weight: 600;
            color: #495057;
        }

        .status-value {
            color: #212529;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-connected { background: #28a745; }
        .dot-disconnected { background: #dc3545; }
        .dot-on { background: #28a745; }
        .dot-standby { background: #ffc107; }
        .dot-off { background: #6c757d; }

        .channel-count {
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-left: auto;
        }

        .control-panel {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 5px;
            align-items: center;
            background: #f8f9fa;
            padding: 5px;
            border-radius: 8px;
        }

        .control-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            min-width: 60px;
            justify-content: center;
        }

        .control-btn.power-on {
            background: #28a745;
            color: white;
        }

        .control-btn.power-off {
            background: #dc3545;
            color: white;
        }

        .control-btn.volume {
            background: #007bff;
            color: white;
        }

        .control-btn.mute {
            background: #6c757d;
            color: white;
        }

        .control-btn:hover {
            transform: translateY(-1px);
            filter: brightness(110%);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .volume-display {
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            min-width: 80px;
            text-align: center;
        }

        .search-section {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #e9ecef;
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            font-size: 1em;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .channels-section {
            padding: 0 20px 20px 20px;
            background: white;
        }

        .channels-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-top: 15px;
        }

        .channels-title {
            font-size: 1.2em;
            color: #333;
        }

        .refresh-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .refresh-btn:hover {
            background: #218838;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }

        .channel-card {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            border: 1px solid transparent;
            font-size: 0.9em;
        }

        .channel-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .channel-card.current {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-color: #667eea;
        }

        .channel-card.hidden {
            display: none;
        }

        .channel-info {
            flex: 1;
        }

        .channel-number {
            font-size: 1em;
            font-weight: bold;
            color: #667eea;
        }

        .channel-name {
            font-size: 0.9em;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .switch-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.2s;
        }

        .switch-btn:hover {
            background: #0056b3;
        }

        .switch-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            grid-column: span 5;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 6px;
            color: white;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            font-size: 0.9em;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
        .notification.info { background: #17a2b8; }

        .no-channels {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            grid-column: span 5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📺 Sony TV Remote</h1>
        </div>

        <div class="status-bar" id="statusBar">
            <div class="status-item">
                <span class="status-label">Connection:</span>
                <span class="status-dot" id="connectionDot"></span>
                <span class="status-value" id="connectionStatus">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Power:</span>
                <span class="status-dot" id="powerDot"></span>
                <span class="status-value" id="powerStatus">Unknown</span>
            </div>
            <div class="status-item">
                <span class="status-label">TV IP:</span>
                <span class="status-value" id="tvIp">{{TV_IP}}</span>
            </div>
            <div class="channel-count" id="channelCount">0 channels</div>
        </div>

        <div class="control-panel">
            <div class="control-group">
                <button class="control-btn power-on" onclick="powerOn()" id="powerOnBtn">🔴 On</button>
                <button class="control-btn power-off" onclick="powerOff()" id="powerOffBtn">⚫ Off</button>
            </div>

            <div class="control-group">
                <button class="control-btn mute" onclick="toggleMute()" id="muteBtn">🔇 Mute</button>
                <button class="control-btn volume" onclick="volumeDown()" id="volumeDownBtn">🔊 -</button>
                <span class="volume-display" id="volumeDisplay">--</span>
                <button class="control-btn volume" onclick="volumeUp()" id="volumeUpBtn">🔊 +</button>
            </div>
        </div>

        <div class="search-section">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Type to filter channels by name...">
        </div>

        <div class="channels-section">
            <div class="channels-header">
                <h2 class="channels-title">TV Channels</h2>
                <button class="refresh-btn" id="refreshBtn" onclick="refreshChannels()">
                    🔄 Refresh
                </button>
            </div>

            <div id="channelsContainer" class="channels-grid">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    Loading channels...
                </div>
            </div>
        </div>
    </div>

    <div id="notification" style="display: none;"></div>

    <script>
        let currentChannel = null;
        let allChannels = [];
        let currentVolume = null;
        let isMuted = false;
        let searchTimeout = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadChannels();
            loadStatus();
            loadVolume();

            document.getElementById('searchBox').addEventListener('input', function(e) {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    filterChannels(e.target.value);
                }, 50); // Instant filtering
            });
        });

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.style.display = 'block';
            notification.className = 'notification ' + type;
            notification.textContent = message;

            setTimeout(() => {
                notification.style.display = 'none';
            }, 2000);
        }

        function loadStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const connected = data.data.connected;
                    const power = data.data.power;

                    const dot = document.getElementById('connectionDot');
                    const status = document.getElementById('connectionStatus');
                    dot.className = 'status-dot ' + (connected ? 'dot-connected' : 'dot-disconnected');
                    status.textContent = connected ? 'Connected' : 'Disconnected';

                    const powerDot = document.getElementById('powerDot');
                    const powerStatus = document.getElementById('powerStatus');

                    let powerDotClass = 'status-dot ';
                    if (power === 'active') {
                        powerDotClass += 'dot-on';
                        powerStatus.textContent = 'On';
                    } else if (power === 'standby') {
                        powerDotClass += 'dot-standby';
                        powerStatus.textContent = 'Standby';
                    } else {
                        powerDotClass += 'dot-off';
                        powerStatus.textContent = 'Off';
                    }
                    powerDot.className = powerDotClass;

                    document.getElementById('powerOnBtn').disabled = !connected;
                    document.getElementById('powerOffBtn').disabled = !connected;
                    document.getElementById('volumeUpBtn').disabled = !connected;
                    document.getElementById('volumeDownBtn').disabled = !connected;
                    document.getElementById('muteBtn').disabled = !connected;
                })
                .catch(error => {
                    console.error('Status error:', error);
                });
        }

        function loadVolume() {
            fetch('/api/volume')
                .then(response => response.json())
                .then(data => {
                    if (data.data.volume !== null) {
                        currentVolume = data.data.volume;
                        isMuted = data.data.muted || false;
                        updateVolumeDisplay();
                    }
                })
                .catch(error => {
                    console.error('Volume error:', error);
                });
        }

        function updateVolumeDisplay() {
            const display = document.getElementById('volumeDisplay');
            if (isMuted) {
                display.textContent = 'Muted';
                display.style.background = '#dc3545';
                display.style.color = 'white';
            } else {
                display.textContent = currentVolume !== null ? currentVolume + '%' : '--';
                display.style.background = '#e9ecef';
                display.style.color = '#212529';
            }
        }

        function powerOn() {
            sendCommand('/api/power/on', 'Powering on...');
        }

        function powerOff() {
            sendCommand('/api/power/off', 'Powering off...');
        }

        function volumeUp() {
            sendCommand('/api/volume/up', 'Volume up...', () => {
                if (currentVolume !== null) {
                    currentVolume = Math.min(100, currentVolume + 1);
                    isMuted = false;
                    updateVolumeDisplay();
                }
            });
        }

        function volumeDown() {
            sendCommand('/api/volume/down', 'Volume down...', () => {
                if (currentVolume !== null) {
                    currentVolume = Math.max(0, currentVolume - 1);
                    isMuted = false;
                    updateVolumeDisplay();
                }
            });
        }

        function toggleMute() {
            const endpoint = isMuted ? '/api/volume/unmute' : '/api/volume/mute';
            sendCommand(endpoint, isMuted ? 'Unmuting...' : 'Muting...', () => {
                isMuted = !isMuted;
                updateVolumeDisplay();
            });
        }

        function sendCommand(endpoint, message, callback) {
            const btn = event?.target;
            if (btn) {
                const originalText = btn.textContent;
                btn.disabled = true;
                btn.textContent = '⏳';

                fetch(endpoint)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            showNotification('Command sent', 'success');
                            if (callback) callback();
                            loadVolume();
                            loadStatus();
                        } else {
                            showNotification('Failed', 'error');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        showNotification('Command failed', 'error');
                    })
                    .finally(() => {
                        btn.disabled = false;
                        btn.textContent = originalText;
                    });
            }
        }

        function loadChannels() {
            fetch('/api/channels')
                .then(response => response.json())
                .then(data => {
                    if (data.status == 'success') {
                        allChannels = data.data.channels;
                        renderChannels(allChannels);
                        document.getElementById('channelCount').textContent =
                            allChannels.length + ' channels';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('channelsContainer').innerHTML =
                        '<div class="error-message">Failed to load channels</div>';
                });
        }

        function refreshChannels() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.innerHTML = '🔄 Refreshing...';

            document.getElementById('channelsContainer').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    Refreshing channels...
                </div>
            `;

            fetch('/api/refresh')
                .then(response => response.json())
                .then(data => {
                    if (data.status == 'success') {
                        allChannels = data.data.channels;
                        renderChannels(allChannels);
                        showNotification('Channels refreshed!', 'success');
                        loadStatus();
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('Refresh failed', 'error');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerHTML = '🔄 Refresh';
                });
        }

        function filterChannels(query) {
            const cards = document.querySelectorAll('.channel-card');
            const searchTerm = query.toLowerCase().trim();

            cards.forEach(card => {
                const channelName = card.querySelector('.channel-name').textContent.toLowerCase();
                if (searchTerm === '' || channelName.includes(searchTerm)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });

            // Show count of visible channels
            const visibleCount = document.querySelectorAll('.channel-card:not(.hidden)').length;
            if (visibleCount === 0) {
                const container = document.getElementById('channelsContainer');
                if (!document.querySelector('.no-results')) {
                    const noResults = document.createElement('div');
                    noResults.className = 'no-channels no-results';
                    noResults.innerHTML = 'No matching channels found';
                    container.appendChild(noResults);
                }
            } else {
                const noResults = document.querySelector('.no-results');
                if (noResults) noResults.remove();
            }
        }

        function switchChannel(channelNumber, channelName) {
            const btn = event.target;
            btn.disabled = true;
            const originalText = btn.textContent;
            btn.textContent = '⏳';

            fetch('/api/switch/' + encodeURIComponent(channelNumber))
                .then(response => response.json())
                .then(data => {
                    if (data.status == 'success') {
                        showNotification('Switched to ' + channelName, 'success');
                        currentChannel = channelNumber;
                        renderChannels(allChannels);
                    } else {
                        showNotification('Failed to switch', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('Switch failed', 'error');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = originalText;
                });
        }

        function renderChannels(channels) {
            const container = document.getElementById('channelsContainer');

            if (!channels || channels.length == 0) {
                container.innerHTML = `
                    <div class="no-channels">
                        <i>📺</i>
                        <h3>No channels found</h3>
                        <p>Try refreshing</p>
                    </div>
                `;
                return;
            }

            let html = '';
            channels.forEach(channel => {
                const isCurrent = channel.number == currentChannel;
                const channelClass = 'channel-card' + (isCurrent ? ' current' : '');

                html += `
                    <div class="${channelClass}" data-number="${channel.number}">
                        <div class="channel-info">
                            <div class="channel-number">${channel.number || '---'}</div>
                            <div class="channel-name" title="${channel.name}">${channel.name}</div>
                        </div>
                        <button class="switch-btn"
                                onclick="switchChannel('${channel.number}', '${channel.name.replace(/'/g, "\\'")}')"
                                ${isCurrent ? 'disabled' : ''}>
                            ${isCurrent ? '✓' : 'Switch'}
                        </button>
                    </div>
                `;
            });

            container.innerHTML = html;

            // Re-apply current search filter
            const searchBox = document.getElementById('searchBox');
            if (searchBox.value) {
                filterChannels(searchBox.value);
            }
        }
    </script>
</body>
</html>
